<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Egzaminacyjny</title>
    <style>
        /* Styl dla ekranu logowania kluczem */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f4f4; display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 9999;
        }
        #loginBox { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; font-size: 16px; margin: 10px; text-transform: uppercase; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; margin-top: 10px; font-weight: bold; }

        /* Początkowo ukrywamy treść egzaminu */
        #examContent { display: none; padding: 20px; }
    </style>
</head>
<body>

    <!-- EKRAN WPROWADZANIA KLUCZA -->
    <div id="loginScreen">
        <div id="loginBox">
            <h2>Dostęp do egzaminu</h2>
            <p>Wprowadź jednorazowy klucz otrzymany od egzaminatora:</p>
            <input type="text" id="keyInput" placeholder="np. A1B2-C3D4" maxlength="9">
            <br>
            <button onclick="validateKey()">Rozpocznij egzamin</button>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <!-- TREŚĆ EGZAMINU (TUTAJ WKLEJ SWÓJ STARY KOD EGZAMINU) -->
    <div id="examContent">
        <h1>Witaj na egzaminie!</h1>
        <p>Tutaj znajduje się treść Twojego egzaminu (pytania, timer itp.).</p>
        
        <!-- 
            TU WKLEJ RESZTĘ SWOJEGO KODU HTML EGZAMINU 
        -->
        
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // TU WKLEJ SWOJĄ KONFIGURACJĘ FIREBASE (TĘ SAMĄ CO W GENERATORZE)
        const firebaseConfig = {
        apiKey: "AIzaSyC-Qxs9Zd0x1_1tpsiAQJE9QYkdPIARPXU", 
        authDomain: "dord---ewidencja-kursow.firebaseapp.com", 
        databaseURL: "https://dord---ewidencja-kursow-default-rtdb.europe-west1.firebasedatabase.app/", 
        projectId: "dord---ewidencja-kursow", 
        storageBucket: "dord---ewidencja-kursow.appspot.com", 
        messagingSenderId: "652495067977", 
        appId: "1:652495067977:web:61868205fa85f02d905898" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function validateKey() {
            const keyInput = document.getElementById('keyInput').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!keyInput) {
                errorMsg.innerText = "Wprowadź klucz!";
                return;
            }

            errorMsg.innerText = "Sprawdzanie klucza...";
            
            // Odwołujemy się do konkretnego klucza w bazie
            const keyRef = database.ref('examKeys/' + keyInput);

            // Używamy transakcji, aby upewnić się, że klucz jest użyty tylko RAZ
            // Działa to tak: próbujemy zmienić status z 'active' na 'used'.
            keyRef.transaction((currentData) => {
                if (currentData === null) {
                    // Klucz nie istnieje w bazie
                    return null; 
                }
                if (currentData.status === 'active') {
                    // Klucz jest aktywny, zmieniamy status na zużyty
                    return { status: 'used', usedAt: Date.now() };
                } else {
                    // Klucz już został użyty (status inny niż active)
                    return; // Przerywamy transakcję (abort)
                }
            }, (error, committed, snapshot) => {
                if (error) {
                    errorMsg.innerText = "Błąd połączenia z bazą.";
                    console.error(error);
                } else if (!committed) {
                    // Transakcja przerwana = klucz był już użyty lub nie istnieje
                    errorMsg.innerText = "Nieprawidłowy lub już użyty klucz!";
                } else {
                    // Sukces! Klucz był aktywny i właśnie go zużyliśmy
                    unlockExam();
                }
            });
        }

        function unlockExam() {
            // Ukrywamy ekran logowania
            document.getElementById('loginScreen').style.display = 'none';
            // Pokazujemy treść egzaminu
            document.getElementById('examContent').style.display = 'block';
            
            // TUTAJ MOŻESZ URUCHOMIĆ FUNKCJE, KTÓRE MIAŁEJ W SWOIM SKRYPCIE,
            // NP. START TIMERA, ŁADOWANIE PYTAŃ ITP.
            // np: startTimer(); 
        }
    </script>
</body>
</html>
