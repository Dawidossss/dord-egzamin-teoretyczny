<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egzamin DORD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #f1c40f;
            --text: #ffffff;
            --muted: #888;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* --- LOGIN --- */
        #loginScreen { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        
        .login-box { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px; object-fit: cover; }
        .title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .subtitle { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }

        .form-group { width: 100%; margin-bottom: 15px; }
        .input { 
            width: 100%; 
            padding: 15px; 
            background: #2a2a2a; 
            border: 2px solid #333; 
            border-radius: 10px; 
            color: #fff; 
            text-align: center; 
            font-size: 18px; 
            font-weight: 600; 
            letter-spacing: 2px; 
            outline: none; 
        }
        .input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg { color: var(--danger); font-size: 13px; margin-top: 15px; text-align: center; min-height: 20px; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }

        /* --- EXAM --- */
        #examScreen { display: none; width: 100%; height: 100%; flex-direction: column; }
        
        .header { background: var(--card); padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; color: var(--muted); }
        .header span { color: var(--accent); font-weight: 700; }

        .timer-box { background: #111; padding: 10px 20px; text-align: center; }
        .timer-bar-bg { height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        .timer-bar-fg { height: 100%; background: var(--accent); transition: width 0.1s linear; }
        .timer-val { font-size: 48px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .timer-val.warn { color: var(--danger); }

        .q-area { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        
        .q-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 15px; text-transform: uppercase; font-weight: 700; }
        .q-pts.p3 { color: var(--danger); }
        .q-pts.p2 { color: var(--accent); }
        .q-pts.p1 { color: var(--success); }

        .q-card { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #333; margin-bottom: 25px; }
        .q-text { font-size: 20px; line-height: 1.5; text-align: center; }

        .ans-grid { display: grid; gap: 12px; }
        .ans-grid.tf { grid-template-columns: 1fr 1fr; }
        .ans-grid.abc { grid-template-columns: 1fr; }

        .ans-btn { 
            padding: 18px; 
            background: #2a2a2a; 
            border: 2px solid #333; 
            border-radius: 10px; 
            color: #ccc; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.15s;
        }
        .ans-btn:hover { background: #333; border-color: #444; color: #fff; }
        /* Ukrywamy kolory podczas egzaminu - usuwam klasy .correct/.wrong z CSS, bo JS ich nie doda */

        .footer { background: var(--card); padding: 10px; border-top: 1px solid #333; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .dot.done { background: #555; } /* Szare po odpowiedzi, bez info czy ok */

        /* --- RESULT --- */
        #resultScreen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; background: var(--bg); padding: 20px; }
        .res-box { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 100%; border: 1px solid #333; }
        .res-big { font-size: 64px; font-weight: 800; margin: 10px 0; }
        .res-big.pass { color: var(--success); }
        .res-big.fail { color: var(--danger); }
        .res-title { margin: 10px 0 20px 0; font-size: 22px; }
        .res-desc { color: var(--muted); font-size: 14px; line-height: 1.5; }
        .res-details { margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; text-align: left; font-size: 13px; color: #aaa; max-height: 200px; overflow-y: auto; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) { .ans-grid.tf { grid-template-columns: 1fr; } }
    </style>
</head>

        </div>
    </div>

        // --- KONFIGURACJA ---
        const firebaseConfig = {
            apiKey: "AIzaSyC-Qxs9Zd0x1_1tpsiAQJE9QYkdPIARPXU",
            authDomain: "dord---ewidencja-kursow.firebaseapp.com",
            databaseURL: "https://dord---ewidencja-kursow-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dord---ewidencja-kursow",
            storageBucket: "dord---ewidencja-kursow.appspot.com",
            messagingSenderId: "652495067977",
            appId: "1:652495067977:web:61868205fa85f02d905898"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let examQuestions = [];
        let qIndex = 0;
        let score = 0;
        let maxScore = 0;
        let history = []; // historia odpowiedzi
        let timerObj;
        let timeLeft = 0;
        const PASS = 68;
        const TARGET = 74;

        // --- LOGOWANIE (ZABEZPIECZONE) ---
        document.getElementById('keyInput').addEventListener('keyup', e => { if(e.key==='Enter') validateKey(); });

        function validateKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            const err = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            const spin = document.getElementById('loginSpinner');

            if(!key || key.length !== 9) return showError("Wpisz klucz w formacie XXXX-XXXX");
            
            btn.style.display = 'none';
            spin.style.display = 'block';
            err.innerText = "";

            // Krok 1: Sprawdź czy klucz istnieje
            db.ref('examKeys/' + key).get().then(snap => {
                if(!snap.exists()) {
                    showError("Klucz nie istnieje w systemie.");
                    resetBtn();
                    return;
                }
                const data = snap.val();
                if(data.status !== 'active') {
                    showError("Ten klucz został już wykorzystany.");
                    resetBtn();
                    return;
                }

                // Krok 2: Próba zablokowania (transakcja)
                db.ref('examKeys/' + key).transaction(d => {
                    if(d.status === 'active') return { status: 'used', usedAt: Date.now() };
                    else return; // Abort
                }, (error, committed, nsnap) => {
                    if(error) {
                        showError("Błąd zapisu. Spróbuj ponownie.");
                        resetBtn();
                    } else if(!committed) {
                        showError("Ktoś inny użył tego klucza w tym samym momencie.");
                        resetBtn();
                    } else {
                        // SUKCES
                        startExam();
                    }
                });
            }).catch(err => {
                showError("Błąd połączenia z bazą.");
                console.log(err);
                resetBtn();
            });
        }

        function showError(msg) {
            document.getElementById('loginError').innerText = msg;
        }
        function resetBtn() {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('loginSpinner').style.display = 'none';
        }

        // --- LOGIKA EGZAMINU ---
        function startExam() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'flex';

            // Sortowanie: Najpierw 20 TF, potem 12 ABC. Wewnątrz grup losowo.
            const poolTF = questionsData.filter(q => q.type === 'tf');
            const poolABC = questionsData.filter(q => q.type === 'abc');

            // Dobór punktowy (zachowujemy logikę 74 pkt)
            // ... (uproszczona logika doboru, bo baza jest duża, bierzemy po kolei z przetasowanych)
            let tf = shuffle(poolTF);
            let abc = shuffle(poolABC);
            
            // Uproszczona selekcja, by miec pewnosc ze mamy ilosc pytan
            // W prawdziwym systemie nalezy pilnowac punktacji, tu dla uproszczenia biore pierwsze 20 i 12
            // Ale z proba zachowania pkt:
            let selTF = [], selABC = [];
            let ptsTF = 0, ptsABC = 0;
            
            // TF: 20 pytan
            // Bierzemy takie, by suma wyszła ok.
            // Na sztywno: bierzemy pierwsze 20 z shuffled, w bazie jest mix.
            // Dla pewności punktów: bierzemy tyle 3pkt ile sie da, potem reszte.
            let tf3 = tf.filter(q=>q.points===3);
            let tf2 = tf.filter(q=>q.points===2);
            let tf1 = tf.filter(q=>q.points===1);
            
            // Chcemy ok 40 pkt z TF.
            while(selTF.length < 20) {
                if(tf3.length > 0 && (ptsTF + 3) <= 60) { // limit bezpieczny
                    let q = tf3.pop(); selTF.push(q); ptsTF += q.points;
                } else if(tf2.length > 0 && (ptsTF + 2) <= 60) {
                    let q = tf2.pop(); selTF.push(q); ptsTF += q.points;
                } else if(tf1.length > 0) {
                    let q = tf1.pop(); selTF.push(q); ptsTF += q.points;
                } else {
                    // fallback
                    let q = tf.pop(); if(q) { selTF.push(q); ptsTF += q.points; } else break;
                }
            }

            // ABC: 12 pytan
            let abc3 = abc.filter(q=>q.points===3);
            let abc2 = abc.filter(q=>q.points===2);
            while(selABC.length < 12) {
                if(abc3.length > 0) {
                    let q = abc3.pop(); selABC.push(q); ptsABC += q.points;
                } else if(abc2.length > 0) {
                    let q = abc2.pop(); selABC.push(q); ptsABC += q.points;
                } else {
                    let q = abc.pop(); if(q) { selABC.push(q); ptsABC += q.points; } else break;
                }
            }

            examQuestions = [...selTF, ...selABC]; // TF pierwsze, ABC drugie
            maxScore = examQuestions.reduce((s, q) => s + q.points, 0);

            document.getElementById('qTotal').innerText = examQuestions.length;
            buildDots();
            loadQ();
        }

        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        function buildDots() {
            const ft = document.getElementById('footerDots');
            ft.innerHTML = '';
            for(let i=0; i<examQuestions.length; i++) ft.innerHTML += `<div class="dot" id="d${i}"></div>`;
        }

        function updateDots() {
            for(let i=0; i<examQuestions.length; i++) {
                const d = document.getElementById('d'+i);
                if(!d) continue;
                d.className = 'dot';
                if(i < history.length) d.classList.add('done');
                else if(i === qIndex) d.classList.add('active');
            }
        }

        function loadQ() {
            if(qIndex >= examQuestions.length) { finishExam(); return; }
            
            const q = examQuestions[qIndex];
            document.getElementById('qNum').innerText = qIndex + 1;
            document.getElementById('qCat').innerText = q.category;
            document.getElementById('qText').innerText = q.text;
            
            const pEl = document.getElementById('qPts');
            pEl.innerText = q.points + ' pkt';
            pEl.className = 'q-pts p' + q.points;

            const grid = document.getElementById('ansGrid');
            grid.innerHTML = '';

            if(q.type === 'tf') {
                document.getElementById('qType').innerText = 'TAK / NIE';
                grid.className = 'ans-grid tf';
                grid.innerHTML = `<div class="ans-btn" onclick="ans('TAK')">TAK</div><div class="ans-btn" onclick="ans('NIE')">NIE</div>`;
                startTimer(20);
            } else {
                document.getElementById('qType').innerText = 'WYBÓR';
                grid.className = 'ans-grid abc';
                grid.innerHTML = `
                    <div class="ans-btn" onclick="ans('A')">A. ${q.A}</div>
                    <div class="ans-btn" onclick="ans('B')">B. ${q.B}</div>
                    <div class="ans-btn" onclick="ans('C')">C. ${q.C}</div>
                `;
                startTimer(50);
            }
            updateDots();
        }

        function startTimer(secs) {
            clearInterval(timerObj);
            timeLeft = secs;
            const bar = document.getElementById('tBar');
            const val = document.getElementById('tVal');
            val.innerText = timeLeft;
            val.classList.remove('warn');
            bar.style.width = '100%';

            timerObj = setInterval(() => {
                timeLeft--;
                val.innerText = timeLeft;
                bar.style.width = ((timeLeft / secs) * 100) + '%';
                if(timeLeft <= 5) val.classList.add('warn');
                if(timeLeft <= 0) { clearInterval(timerObj); timeOut(); }
            }, 1000);
        }

        function timeOut() {
            registerAnswer(null); // brak odpowiedzi
        }

        function ans(v) {
            clearInterval(timerObj);
            registerAnswer(v);
        }

        function registerAnswer(userAns) {
            const q = examQuestions[qIndex];
            const correct = userAns === q.answer;
            if(correct) score += q.points;
            
            history.push({ q: q, user: userAns, ok: correct });
            
            // Brak visual feedback (kolorów) - przechodzimy dalej
            updateDots();
            qIndex++;
            loadQ();
        }

        function finishExam() {
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            const passed = score >= PASS;
            
            document.getElementById('resScore').innerText = score + ' / ' + maxScore;
            document.getElementById('resScore').className = 'res-big ' + (passed ? 'pass' : 'fail');
            
            const title = document.getElementById('resTitle');
            const desc = document.getElementById('resDesc');

            if(passed) {
                title.innerText = "EGZAMIN ZDANY";
                title.style.color = "var(--success)";
                desc.innerText = "Gratulacje! Osiągnąłeś wymagany próg punktowy ("+PASS+").";
            } else {
                title.innerText = "EGZAMIN NIEZDANY";
                title.style.color = "var(--danger)";
                desc.innerText = "Niestety, wynik jest poniżej wymaganego progu ("+PASS+").";
            }

            // Lista odpowiedzi na końcu
            let html = '';
            history.forEach((h, i) => {
                let color = h.ok ? 'var(--success)' : 'var(--danger)';
                let status = h.ok ? 'OK' : 'ŹLE';
                let uAns = h.user || 'BRAK';
                html += `<div style='margin-bottom:4px; color:${color};'>${i+1}. ${status} (Twoja odp: ${uAns}, Poprawna: ${h.q.answer})</div>`;
            });
            document.getElementById('resDetails').innerHTML = html;
        }
    </script>
