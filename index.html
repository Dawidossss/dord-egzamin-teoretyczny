<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egzamin DORD - System</title>
    <style>
        /* RESET I GLOBALNE USTAWIENIA */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary: #f1c40f;
            --text-main: #ffffff;
            --text-muted: #888888;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- EKRAN LOGOWANIA (POPRAWIONY) --- */
        #loginScreen { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        .login-card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 400px; /* Stała szerokość karty */
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            align-items: center; /* Wyśrodkowanie wszystkiego wewnątrz */
            border: 1px solid #333;
        }

        .login-logo { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: 3px solid var(--primary); 
            margin-bottom: 20px; 
            object-fit: cover;
        }

        .login-title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .login-sub { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 35px; }

        /* Formularz */
        .login-form { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        .login-input { 
            width: 100%; 
            padding: 15px; 
            font-size: 18px; 
            background: #2a2a2a; 
            border: 2px solid #333; 
            border-radius: 8px; 
            color: #fff; 
            text-align: center; 
            font-weight: 600; 
            letter-spacing: 2px; 
            outline: none; 
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: var(--primary); }

        .login-btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:active { transform: scale(0.98); }

        .login-error { 
            color: var(--danger); 
            font-size: 13px; 
            text-align: center; 
            min-height: 20px; 
            margin-top: 10px;
            display: none;
        }
        .login-spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }

        /* --- EKRAN EGZAMINU --- */
        #examScreen { display: none; width: 100%; height: 100%; flex-direction: column; }
        
        .exam-header { padding: 15px; background: var(--card-bg); border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); }
        .exam-header span { color: var(--primary); font-weight: 700; }

        .timer-wrap { padding: 10px 20px; background: #111; text-align: center; }
        .timer-progress-bg { height: 4px; background: #333; border-radius: 2px; width: 100%; margin-bottom: 10px; }
        .timer-progress-fg { height: 100%; background: var(--primary); width: 100%; transition: width 0.1s linear; border-radius: 2px; }
        .timer-time { font-size: 48px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .timer-time.warn { color: var(--danger); animation: pulse 0.5s infinite; }

        .question-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        
        .q-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; }
        .q-points { font-weight: 700; }
        .q-points.p3 { color: var(--danger); }
        .q-points.p2 { color: var(--primary); }
        .q-points.p1 { color: var(--success); }

        .q-box { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid #333; margin-bottom: 30px; text-align: center; }
        .q-text { font-size: 20px; line-height: 1.5; font-weight: 500; }

        .answers { display: grid; gap: 15px; }
        .answers.tf { grid-template-columns: 1fr 1fr; }
        .answers.abc { grid-template-columns: 1fr; }

        .ans-btn { 
            padding: 20px; 
            background: #2a2a2a; 
            border: 2px solid #333; 
            border-radius: 8px; 
            color: #ccc; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.15s; 
            user-select: none;
        }
        .ans-btn:hover { background: #333; border-color: #444; color: #fff; }
        .ans-btn.selected { border-color: var(--primary); background: rgba(241, 196, 15, 0.1); color: var(--primary); }
        .ans-btn.correct { border-color: var(--success); background: rgba(39, 174, 96, 0.2); color: var(--success); }
        .ans-btn.wrong { border-color: var(--danger); background: rgba(231, 76, 60, 0.2); color: var(--danger); }
        .ans-btn.locked { pointer-events: none; opacity: 0.7; }

        /* Stopka z kropkami */
        .progress-footer { background: var(--card-bg); padding: 10px; border-top: 1px solid #333; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.2s; }
        .dot.cur { background: var(--primary); box-shadow: 0 0 5px var(--primary); }
        .dot.ok { background: var(--success); }
        .dot.fail { background: var(--danger); }

        /* Wyniki */
        #resultScreen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; background: var(--bg-dark); }
        .result-box { background: var(--card-bg); padding: 40px; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        .r-score { font-size: 48px; font-weight: 800; margin: 10px 0; }
        .r-score.pass { color: var(--success); }
        .r-score.fail { color: var(--danger); }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        @media (max-width: 600px) {
            .answers.tf { grid-template-columns: 1fr; }
            .q-text { font-size: 18px; }
        }
    </style>
</head>

            { text: "Kiedy należy sprawdzić poziom oleju?", A: "Na ciepłym silniku", B: "Na zimnym", C: "Podczas jazdy", answer: "B", points: 2, type: "abc", category: "Technika" }

        // --- KONFIGURACJA ---
        const firebaseConfig = {
            apiKey: "AIzaSyC-Qxs9Zd0x1_1tpsiAQJE9QYkdPIARPXU",
            authDomain: "dord---ewidencja-kursow.firebaseapp.com",
            databaseURL: "https://dord---ewidencja-kursow-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dord---ewidencja-kursow",
            storageBucket: "dord---ewidencja-kursow.appspot.com",
            messagingSenderId: "652495067977",
            appId: "1:652495067977:web:61868205fa85f02d905898"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let examQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let maxScore = 0;
        let answers = [];
        let timer;
        let timeLeft = 0;
        const PASS_SCORE = 68;
        const TOTAL_TARGET = 74;

        // --- LOGOWANIE ---
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginError = document.getElementById('loginError');
        
        // Obsługa Entera
        document.getElementById('keyInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') validateKey();
        });

        function validateKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key || key.length !== 9) return showError('Wprowadź poprawny klucz (XXXX-XXXX)');
            
            loginBtn.style.display = 'none';
            loginSpinner.style.display = 'block';
            loginError.style.display = 'none';

            db.ref('examKeys/' + key).transaction(data => {
                if(data === null) return null;
                if(data.status === 'active') return { status: 'used', usedAt: Date.now() };
                return; // Already used or other
            }, (err, committed, snap) => {
                if(err) {
                    showError('Błąd połączenia.');
                    resetLogin();
                } else if(!committed) {
                    showError('Klucz nieprawidłowy lub wykorzystany.');
                    resetLogin();
                } else {
                    startExam();
                }
            });
        }

        function showError(msg) {
            loginError.innerText = msg;
            loginError.style.display = 'block';
        }
        function resetLogin() {
            loginBtn.style.display = 'block';
            loginSpinner.style.display = 'none';
        }

        // --- EGZAMIN LOGIC ---
        function startExam() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'flex';

            // Dobór pytań (20 TF, 12 ABC = 32 pytania, suma 74pkt)
            const poolTF = questionsData.filter(q => q.type === 'tf');
            const poolABC = questionsData.filter(q => q.type === 'abc');

            let selectedABC = [];
            let abcScore = 0;
            // ABC: Staraj się dobrać tak, żeby suma pasowała. 
            // Większość ABC to 3 pkt. 12 pytań * 3 = 36 pkt.
            // Potrzebujemy 38 pkt z TF.
            // TF: 20 pytań. Średnia 1.9 pkt. Czyli głównie 2 pkt i trochę 3 pkt.
            
            // Losowanie ABC
            let abc3 = shuffle(poolABC.filter(q => q.points === 3));
            let abc2 = shuffle(poolABC.filter(q => q.points === 2));
            
            // Weźmy maksymalnie 3-punktowe
            while(selectedABC.length < 12 && abc3.length > 0) {
                selectedABC.push(abc3.pop());
                abcScore += 3;
            }
            // Uzupełnij 2-punktowymi jak brakuje
            while(selectedABC.length < 12 && abc2.length > 0) {
                selectedABC.push(abc2.pop());
                abcScore += 2;
            }

            // Oblicz ile brakuje z TF
            let neededTF = TOTAL_TARGET - abcScore;
            let selectedTF = [];
            let tfScore = 0;

            let tf3 = shuffle(poolTF.filter(q => q.points === 3));
            let tf2 = shuffle(poolTF.filter(q => q.points === 2));
            let tf1 = shuffle(poolTF.filter(q => q.points === 1));

            // Algorytm: bierzemy 3 pkt dopóki bezpiecznie, potem 2, potem 1.
            // "Bezpiecznie" = musi starczyć miejsc na uzupełnienie jedynkami.
            
            for(let i=0; i<tf3.length; i++) {
                if(selectedTF.length >= 20) break;
                let current = selectedTF.reduce((s,q) => s+q.points, 0);
                let spots = 20 - selectedTF.length;
                // Jeśli dodam 3, czy starczy mi miejsc (spots-1) * 1 pkt żeby dobić do needed?
                // Nie, chodzi o to by nie przekroczyć neededTF za bardzo, ale musimy mieć 20 pytań.
                // Łatwiej: bierzemy tyle 3 i 2, żeby uzbierać ok 38-40 pkt.
                
                // Uproszczony dobór:
                if(tfScore + 3 <= neededTF + 5) { // margines błędu
                     selectedTF.push(tf3[i]);
                     tfScore += 3;
                }
            }
            
            for(let i=0; i<tf2.length; i++) {
                if(selectedTF.length >= 20) break;
                if(tfScore + 2 <= neededTF + 5) {
                     selectedTF.push(tf2[i]);
                     tfScore += 2;
                }
            }

            // Uzupełnij do 20 (jeśli brakuje miejsc lub punktów)
            while(selectedTF.length < 20) {
                // Jeśli za dużo punktów, bierzemy 1. Jeśli za mało, bierzemy co się da.
                // Ale musimy po prostu dobić do 20 pytań.
                // Bierzemy z puli tf1, tf2, tf3 (to co zostało)
                let q = tf1.pop() || tf2.pop() || tf3.pop();
                if(q) {
                    selectedTF.push(q);
                    tfScore += q.points;
                } else break;
            }

            examQuestions = shuffle([...selectedTF, ...selectedABC]);
            maxScore = examQuestions.reduce((s, q) => s + q.points, 0);

            // Init UI
            document.getElementById('totalQ').innerText = examQuestions.length;
            generateDots();
            loadQuestion();
        }

        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        function generateDots() {
            const footer = document.getElementById('progFooter');
            footer.innerHTML = '';
            for(let i=0; i<examQuestions.length; i++) {
                footer.innerHTML += `<div class="dot" id="dot${i}"></div>`;
            }
        }

        function updateDots() {
            for(let i=0; i<examQuestions.length; i++) {
                const d = document.getElementById('dot'+i);
                if(!d) continue;
                d.className = 'dot';
                if(i < answers.length) {
                    d.classList.add(answers[i].correct ? 'ok' : 'fail');
                } else if(i === currentIndex) {
                    d.classList.add('cur');
                }
            }
        }

        function loadQuestion() {
            if(currentIndex >= examQuestions.length) {
                finishExam();
                return;
            }

            const q = examQuestions[currentIndex];
            document.getElementById('curQ').innerText = currentIndex + 1;
            document.getElementById('qCategory').innerText = q.category;
            document.getElementById('qText').innerText = q.text;
            
            const pLabel = document.getElementById('qPointLabel');
            pLabel.innerText = q.points + ' pkt';
            pLabel.className = 'q-points p' + q.points;

            const box = document.getElementById('ansBox');
            box.innerHTML = '';

            if(q.type === 'tf') {
                document.getElementById('qTypeLabel').innerText = 'TAK / NIE';
                box.className = 'answers tf';
                box.innerHTML = `
                    <div class="ans-btn" onclick="select('TAK')">TAK</div>
                    <div class="ans-btn" onclick="select('NIE')">NIE</div>
                `;
                startTimer(20);
            } else {
                document.getElementById('qTypeLabel').innerText = 'WYBÓR';
                box.className = 'answers abc';
                box.innerHTML = `
                    <div class="ans-btn" onclick="select('A')">A. ${q.A}</div>
                    <div class="ans-btn" onclick="select('B')">B. ${q.B}</div>
                    <div class="ans-btn" onclick="select('C')">C. ${q.C}</div>
                `;
                startTimer(50);
            }
            updateDots();
        }

        function startTimer(secs) {
            clearInterval(timer);
            timeLeft = secs;
            const bar = document.getElementById('timerBar');
            const val = document.getElementById('timerVal');
            
            val.innerText = timeLeft;
            val.classList.remove('warn');
            bar.style.width = '100%';

            timer = setInterval(() => {
                timeLeft--;
                val.innerText = timeLeft;
                bar.style.width = ((timeLeft / secs) * 100) + '%';
                
                if(timeLeft <= 5) val.classList.add('warn');
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    timeOut();
                }
            }, 1000);
        }

        function timeOut() {
            // Brak odpowiedzi = błąd
            checkAnswer(null);
        }

        function select(ans) {
            clearInterval(timer);
            checkAnswer(ans);
        }

        function checkAnswer(userAns) {
            const q = examQuestions[currentIndex];
            const isCorrect = userAns === q.answer;
            if(isCorrect) score += q.points;

            answers.push({ correct: isCorrect, points: q.points });
            
            // Visual feedback
            const btns = document.querySelectorAll('.ans-btn');
            btns.forEach(b => {
                b.classList.add('locked'); // disable
                // check if correct button
                let txt = b.innerText;
                // For ABC buttons, we check start letter "A.", "B.", etc.
                // For TF, we check full text
                let code = txt.substring(0,1); 
                if(q.type === 'tf') code = txt;

                if(code === q.answer) b.classList.add('correct');
                else if(code === userAns && !isCorrect) b.classList.add('wrong');
            });

            updateDots();

            setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 1500);
        }

        function finishExam() {
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            const rScore = document.getElementById('resScore');
            const rTitle = document.getElementById('resTitle');
            const rDesc = document.getElementById('resDesc');
            
            rScore.innerText = score + ' / ' + maxScore;
            
            if(score >= PASS_SCORE) {
                rScore.className = 'r-score pass';
                rTitle.innerText = 'EGZAMIN ZDANY';
                rTitle.style.color = 'var(--success)';
                rDesc.innerText = 'Gratulacje! Osiągnąłeś wymagany wynik.';
            } else {
                rScore.className = 'r-score fail';
                rTitle.innerText = 'EGZAMIN NIEZDANY';
                rTitle.style.color = 'var(--danger)';
                rDesc.innerText = 'Wymagane minimum ' + PASS_SCORE + ' punktów.';
            }
        }
    </script>
