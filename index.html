<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egzamin DORD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #111111;
            --muted: #6c757d;
            --primary: #f1c40f; /* Żółty */
            --accent: #111111; /* Czarny */
            --danger: #e74c3c;
            --success: #2ecc71;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .container { width: 100%; max-width: 500px; padding: 15px; }
        
        /* KARTA OGÓLNA */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            border: 1px solid #eee;
            position: relative;
        }

        /* LOGOWANIE */
        .logo-img { width: 50px; height: 50px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        .title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: var(--muted); text-align: center; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 25px; }

        .input-field {
            width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 12px;
            font-size: 20px; font-weight: 700; text-align: center; letter-spacing: 2px;
            background: #fafafa; outline: none; transition: border-color 0.2s; margin-bottom: 15px;
        }
        .input-field:focus { border-color: var(--primary); background: #fff; }

        .btn-main {
            width: 100%; padding: 18px; background: var(--accent); color: #fff;
            border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .btn-main:hover { background: #000; }
        .btn-main:active { transform: scale(0.98); }
        
        .error-text { color: var(--danger); font-size: 13px; text-align: center; margin-top: 15px; font-weight: 600; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }

        /* EGZAMIN */
        #examScreen { display: none; width: 100%; height: 100%; }
        .exam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
        .exam-header span { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        
        .big-number { font-size: 80px; font-weight: 900; color: var(--accent); line-height: 1; text-align: center; margin: 10px 0; letter-spacing: -4px; }
        .q-text-display { font-size: 18px; font-weight: 600; text-align: center; line-height: 1.5; margin-bottom: 25px; min-height: 60px; color: var(--text); }
        
        .points-badge { display: inline-block; background: #eee; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 15px; }
        .points-badge.p3 { background: #ffebee; color: #c62828; }
        .points-badge.p2 { background: #fff8e1; color: #f57f17; }
        .points-badge.p1 { background: #e8f5e9; color: #2e7d32; }

        .timer-bar-bg { height: 6px; background: #eee; border-radius: 3px; width: 100%; margin-bottom: 20px; overflow: hidden; }
        .timer-bar-fg { height: 100%; background: var(--primary); width: 100%; transition: width 0.1s linear; }

        .answers-grid { display: grid; gap: 12px; }
        .answers-grid.tf { grid-template-columns: 1fr 1fr; }
        .answers-grid.abc { grid-template-columns: 1fr; }

        .ans-btn {
            background: #fff; border: 2px solid #eee; padding: 20px; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; text-align: center; color: var(--text);
        }
        .ans-btn:hover { border-color: var(--accent); background: var(--accent); color: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* WYNIKI */
        #resultScreen, #failScreen { display: none; width: 100%; height: 100%; }
        
        .result-header { text-align: center; margin-bottom: 20px; }
        .result-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 800; }
        .result-circle.pass { background: var(--success); color: #fff; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); }
        .result-circle.fail { background: var(--danger); color: #fff; box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3); }
        .r-val { font-size: 32px; line-height: 1; }
        .r-lbl { font-size: 11px; text-transform: uppercase; opacity: 0.9; }

        .history-list { max-height: 400px; overflow-y: auto; padding-right: 5px; width: 100%; }
        .history-item { 
            background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 10px; 
            display: flex; flex-direction: column; transition: transform 0.1s;
        }
        .history-item:active { transform: scale(0.99); }

        .h-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .h-qid { font-weight: 700; font-size: 13px; color: var(--muted); }
        
        .h-status-badge { 
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; 
        }
        .h-status-badge.ok { background: #e8f5e9; color: var(--success); }
        .h-status-badge.bad { background: #ffebee; color: var(--danger); }

        .h-content { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); margin-bottom: 5px; }
        .h-ans { font-size: 12px; color: var(--muted); }
        .h-ans span { font-weight: 700; color: var(--text); }

        /* Ekran Błędu (Oszustwo) */
        .fail-box { text-align: center; padding: 20px 0; }
        .fail-icon { font-size: 50px; margin-bottom: 15px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- LOGOWANIE -->
    <div id="loginScreen">
        <div class="container">
            <div class="card">
                <img src="https://z-cdn-media.chatglm.cn/files/b08df4b5-419e-4896-bd87-bea2a0ed5b07.png?auth_key=1874273734-7660da9223ef487f9e4ebdb6b87873f5-0-5e45fc9e0f294cc363ba5c4d5ddc2300" class="logo-img">
                <div class="title">DORD System</div>
                <div class="subtitle">Weryfikacja dostępu</div>
                <input type="text" id="keyInput" class="input-field" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off">
                <button id="loginBtn" class="btn-main" onclick="validateKey()">Rozpocznij</button>
                <div id="loginSpinner" class="spinner"></div>
                <div id="loginError" class="error-text"></div>
            </div>
        </div>
    </div>

    <!-- EGZAMIN -->
    <div id="examScreen">
        <div class="container">
            <div class="card">
                <div class="exam-header">
                    <span id="qCat">Kategoria</span>
                    <span id="qTypeBadge">TAK/NIE</span>
                </div>
                
                <div class="timer-bar-bg"><div id="tBar" class="timer-bar-fg"></div></div>

                <!-- Wygląd "DUŻY NUMER" -->
                <div style="text-align: center;">
                    <span id="qNum" class="big-number">1</span>
                    <div id="qPts" class="points-badge p3" style="margin-top:-10px; margin-bottom:15px; display:inline-block;">3 pkt</div>
                </div>

                <div id="qText" class="q-text-display">Treść pytania...</div>

                <div id="ansGrid" class="answers-grid tf">
                    <!-- Buttons -->
                </div>
            </div>
        </div>
    </div>

    <!-- WYNIKI -->
    <div id="resultScreen">
        <div class="container">
            <div class="card">
                <div class="result-header">
                    <div id="resCircle" class="result-circle pass">
                        <span id="resScoreVal" class="r-val">0</span>
                        <span class="r-lbl">Pkt</span>
                    </div>
                    <h2 id="resTitle" style="font-size: 18px; font-weight: 800;">WYNIK POZYTYWNY</h2>
                    <p id="resDesc" style="font-size: 13px; color: var(--muted);">Gratulacje!</p>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                <div id="historyList" class="history-list"></div>
            </div>
        </div>
    </div>

    <!-- EKRAN BŁĘDU (OSZUSTWO) -->
    <div id="failScreen">
        <div class="container">
            <div class="card fail-box">
                <div class="fail-icon">⚠️</div>
                <h2 style="color: var(--danger); margin-bottom: 10px;">EGZAMIN UNIEWAŻNIONY</h2>
                <p style="color: var(--muted); font-size: 14px;">Wykryto opuszczenie okna egzaminu. Procedura przerwana.</p>
            </div>
        </div>
    </div>

        // --- KONFIGURACJA ---
        const firebaseConfig = {
            apiKey: "AIzaSyC-Qxs9Zd0x1_1tpsiAQJE9QYkdPIARPXU",
            authDomain: "dord---ewidencja-kursow.firebaseapp.com",
            databaseURL: "https://dord---ewidencja-kursow-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dord---ewidencja-kursow",
            storageBucket: "dord---ewidencja-kursow.appspot.com",
            messagingSenderId: "652495067977",
            appId: "1:652495067977:web:61868205fa85f02d905898"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let examQuestions = [];
        let qIndex = 0;
        let score = 0;
        let history = []; 
        let timerObj;
        let timeLeft = 0;
        const PASS = 68;
        const TARGET = 74;
        let examActive = false; // Flaga czy egzamin trwa

        // --- LOGOWANIE ---
        document.getElementById('keyInput').addEventListener('keyup', e => { if(e.key==='Enter') validateKey(); });

        function validateKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            const err = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            const spin = document.getElementById('loginSpinner');

            if(!key || key.length !== 9) return showError("Wpisz klucz w formacie XXXX-XXXX");
            
            btn.style.display = 'none';
            spin.style.display = 'block';
            err.innerText = "";

            db.ref('examKeys/' + key).get().then(snap => {
                if(!snap.exists()) { showError("Klucz nie istnieje w systemie."); resetBtn(); return; }
                const data = snap.val();
                if(data.status !== 'active') { showError("Ten klucz został już wykorzystany."); resetBtn(); return; }

                db.ref('examKeys/' + key).transaction(d => {
                    if(d.status === 'active') return { status: 'used', usedAt: Date.now() };
                    else return; 
                }, (error, committed, nsnap) => {
                    if(error) { showError("Błąd zapisu."); resetBtn(); }
                    else if(!committed) { showError("Klucz wykorzystany w tym samym momencie."); resetBtn(); }
                    else { startExam(); }
                });
            }).catch(err => { showError("Błąd połączenia."); resetBtn(); });
        }

        function showError(msg) { document.getElementById('loginError').innerText = msg; }
        function resetBtn() {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('loginSpinner').style.display = 'none';
        }

        // --- ANTY-OSZUSTWO (VISIBILITY CHANGE) ---
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && examActive) {
                triggerFail();
            }
        });
        // Dodatkowo wykrycie zmiany zakładki/okna (starsze metody dla kompatybilności)
        window.onblur = () => {
            if(examActive) triggerFail();
        };

        function triggerFail() {
            clearInterval(timerObj);
            examActive = false; // Zatrzymaj logikę
            
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('failScreen').style.display = 'flex';
        }

        // --- LOGIKA EGZAMINU ---
        function startExam() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'flex';
            examActive = true;

            const poolTF = questionsData.filter(q => q.type === 'tf');
            const poolABC = questionsData.filter(q => q.type === 'abc');

            let tf = shuffle(poolTF);
            let abc = shuffle(poolABC);
            
            let selTF = [], ptsTF = 0;
            let tf3 = tf.filter(q=>q.points===3);
            let tf2 = tf.filter(q=>q.points===2);
            let tf1 = tf.filter(q=>q.points===1);
            
            while(selTF.length < 20) {
                if(tf3.length > 0 && (ptsTF + 3) <= 60) { let q = tf3.pop(); selTF.push(q); ptsTF += q.points; }
                else if(tf2.length > 0 && (ptsTF + 2) <= 60) { let q = tf2.pop(); selTF.push(q); ptsTF += q.points; }
                else if(tf1.length > 0) { let q = tf1.pop(); selTF.push(q); ptsTF += q.points; }
                else { let q = tf.pop(); if(q) { selTF.push(q); ptsTF += q.points; } else break; }
            }

            let selABC = [], ptsABC = 0;
            let abc3 = abc.filter(q=>q.points===3);
            let abc2 = abc.filter(q=>q.points===2);
            while(selABC.length < 12) {
                if(abc3.length > 0) { let q = abc3.pop(); selABC.push(q); ptsABC += q.points; }
                else if(abc2.length > 0) { let q = abc2.pop(); selABC.push(q); ptsABC += q.points; }
                else { let q = abc.pop(); if(q) { selABC.push(q); ptsABC += q.points; } else break; }
            }

            examQuestions = [...selTF, ...selABC];
            loadQ();
        }

        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        function loadQ() {
            if(qIndex >= examQuestions.length) { finishExam(); return; }
            
            const q = examQuestions[qIndex];
            document.getElementById('qNum').innerText = qIndex + 1;
            document.getElementById('qCat').innerText = q.category;
            document.getElementById('qText').innerText = q.text;
            
            const pEl = document.getElementById('qPts');
            pEl.innerText = q.points + ' pkt';
            pEl.className = 'points-badge p' + q.points;

            const grid = document.getElementById('ansGrid');
            grid.innerHTML = '';

            if(q.type === 'tf') {
                document.getElementById('qTypeBadge').innerText = 'TAK / NIE';
                grid.className = 'answers-grid tf';
                grid.innerHTML = `<div class="ans-btn" onclick="ans('TAK')">TAK</div><div class="ans-btn" onclick="ans('NIE')">NIE</div>`;
                startTimer(20);
            } else {
                document.getElementById('qTypeBadge').innerText = 'WYBÓR';
                grid.className = 'answers-grid abc';
                grid.innerHTML = `
                    <div class="ans-btn" onclick="ans('A')">A. ${q.A}</div>
                    <div class="ans-btn" onclick="ans('B')">B. ${q.B}</div>
                    <div class="ans-btn" onclick="ans('C')">C. ${q.C}</div>
                `;
                startTimer(50);
            }
        }

        function startTimer(secs) {
            clearInterval(timerObj);
            timeLeft = secs;
            const bar = document.getElementById('tBar');
            bar.style.width = '100%';

            timerObj = setInterval(() => {
                timeLeft--;
                bar.style.width = ((timeLeft / secs) * 100) + '%';
                if(timeLeft <= 0) { clearInterval(timerObj); timeOut(); }
            }, 1000);
        }

        function timeOut() { registerAnswer(null); }
        function ans(v) { clearInterval(timerObj); registerAnswer(v); }

        function registerAnswer(userAns) {
            const q = examQuestions[qIndex];
            const correct = userAns === q.answer;
            if(correct) score += q.points;
            history.push({ q: q, user: userAns, ok: correct });
            qIndex++;
            loadQ();
        }

        function finishExam() {
            examActive = false; // Dezaktywuj monitoring przy prawidłowym końcu
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            const passed = score >= PASS;
            
            // UI Wynikow
            const circle = document.getElementById('resCircle');
            const title = document.getElementById('resTitle');
            const desc = document.getElementById('resDesc');
            
            document.getElementById('resScoreVal').innerText = score;
            
            if(passed) {
                circle.className = 'result-circle pass';
                title.innerText = "WYNIK POZYTYWNY";
                title.style.color = "var(--success)";
                desc.innerText = "Gratulacje! Osiągnąłeś wymagany próg ("+PASS+" pkt).";
            } else {
                circle.className = 'result-circle fail';
                title.innerText = "WYNIK NEGATYWNY";
                title.style.color = "var(--danger)";
                desc.innerText = "Wymagane minimum " + PASS + " punktów.";
            }

            // Historia (ładne kafelki)
            let html = '';
            history.forEach((h, i) => {
                let statusClass = h.ok ? 'ok' : 'bad';
                let statusText = h.ok ? 'POPRAWNA' : 'BŁĄD / BRAK';
                let uAns = h.user || 'BRAK';
                
                // Tworzenie treści odpowiedzi
                let answerContent = '';
                if(h.q.type === 'abc') {
                    let letterContent = '';
                    if(uAns === 'A') letterContent = h.q.A;
                    else if(uAns === 'B') letterContent = h.q.B;
                    else if(uAns === 'C') letterContent = h.q.C;
                    else letterContent = '-';
                    answerContent = `Twoja odp: ${uAns}. ${letterContent}`;
                } else {
                    answerContent = `Twoja odp: ${uAns}`;
                }

                html += `
                    <div class="history-item">
                        <div class="h-top">
                            <span class="h-qid">Pytanie ${i+1}</span>
                            <span class="h-status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="h-content">${h.q.text}</div>
                        <div class="h-ans">${answerContent}</div>
                    </div>
                `;
            });
            document.getElementById('historyList').innerHTML = html;
        }
    </script>
